name: Version plugin build and zip

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Dump autoloader (no dev, optimized)
        run: composer dump-autoload --optimize --no-dev

      - name: Stage plugin files
        run: |
          SLUG=mamarmite-uid-endpoint
          mkdir -p build/$SLUG
          rsync -a --exclude-from='.distignore' ./ build/$SLUG/ \
            --exclude build --exclude .git

      - name: Create zip
        run: |
          cd build
          zip -r ../mamarmite-uid-endpoint.zip mamarmite-uid-endpoint

      - name: Attach zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mamarmite-uid-endpoint.zip
